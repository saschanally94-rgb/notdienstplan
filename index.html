
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Notdienstplan V19</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales/de.global.min.js"></script>

<style>
body{font-family:Arial;margin:10px}
#calendar{max-width:1000px;margin:auto}
button{margin:5px;padding:10px;border-radius:8px;border:none;background:#2d8cff;color:white}
#login{max-width:400px;margin:40px auto;text-align:center}
#controls{text-align:center;margin-bottom:10px}
ul{max-width:600px;margin:auto}
</style>
</head>
<body>

<div id="login">
<h2>Login</h2>
<select id="user">
<option value="admin">Admin</option>
<option value="TK">TK</option>
<option value="DG">DG</option>
<option value="MS">MS</option>
<option value="ES">ES</option>
<option value="SAM">SAM</option>
<option value="DK">DK</option>
</select>
<br><br>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<h2 style="text-align:center">Notdienstplan V19</h2>

<div id="controls">
<button id="generateBtn" onclick="generatePlan()">Plan generieren</button>
<button onclick="showVacation()">Urlaub eintragen</button>
</div>

<div id="calendar"></div>

<h3 style="text-align:center">Tauschanfragen</h3>
<ul id="swaplist"></ul>

</div>

<script>

const employees=["TK","DG","MS","ES","SAM","DK"]

const fixedDays={
1:"TK",
2:"DG",
3:"MS",
4:"ES"
}

let calendar
let currentUser
let swapRequests=JSON.parse(localStorage.getItem("swapRequests")||"[]")

function login(){

currentUser=document.getElementById("user").value

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

if(currentUser!=="admin"){
document.getElementById("generateBtn").style.display="none"
}

initCalendar()
loadPlan()
renderSwap()

}

function initCalendar(){

calendar=new FullCalendar.Calendar(
document.getElementById("calendar"),
{

locale:"de",
firstDay:1,
initialView:"dayGridMonth",

buttonText:{
today:"Heute",
month:"Monat"
},

headerToolbar:{
left:"prev,next today",
center:"title",
right:"dayGridMonth"
},

eventClick:function(info){

if(currentUser==="admin"){
if(confirm("Tauschanfrage bestätigen?")){
info.event.setProp("color","#ffaa00")
savePlan()
}
}else{

if(confirm("Tausch anfragen?")){
swapRequests.push(info.event.startStr+" → "+info.event.title)
localStorage.setItem("swapRequests",JSON.stringify(swapRequests))
renderSwap()
}

}

}

})

calendar.render()

}

function generatePlan(){

calendar.removeAllEvents()

let today=new Date()
let end=new Date()
end.setMonth(today.getMonth()+3)

let stats={}
employees.forEach(e=>stats[e]=0)

let weekendOwner=null

for(let d=new Date(today); d<=end; d.setDate(d.getDate()+1)){

let wd=d.getDay()
let iso=d.toISOString().split("T")[0]
let dienst

if(fixedDays[wd]){

dienst=fixedDays[wd]

}

else if(wd===5){

dienst=getLowest(stats)
weekendOwner=dienst
stats[dienst]++

}

else if(wd===6){

dienst=weekendOwner
stats[dienst]++

}

else if(wd===0){

dienst=weekendOwner
stats[dienst]++

}

else{

dienst=employees[0]

}

calendar.addEvent({
title:dienst,
start:iso,
color:"#2d8cff"
})

}

savePlan()

}

function savePlan(){

let events=calendar.getEvents().map(e=>({
title:e.title,
start:e.startStr,
color:e.backgroundColor
}))

localStorage.setItem("dienstplan",JSON.stringify(events))

}

function loadPlan(){

let data=JSON.parse(localStorage.getItem("dienstplan")||"[]")

data.forEach(e=>{

calendar.addEvent({
title:e.title,
start:e.start,
color:e.color
})

})

}

function getLowest(stats){

let lowest=employees[0]

employees.forEach(e=>{
if(stats[e] < stats[lowest]){
lowest=e
}
})

return lowest

}

function showVacation(){

let ma=prompt("Urlaub für welchen MA? (TK,DG,MS,ES,SAM,DK)")

if(!employees.includes(ma)){
alert("Ungültiger Mitarbeiter")
return
}

let date=prompt("Startdatum (YYYY-MM-DD)")

calendar.addEvent({
title:"Urlaub "+ma,
start:date,
color:"#66cc66"
})

savePlan()

}

function renderSwap(){

let list=document.getElementById("swaplist")
list.innerHTML=""

swapRequests.forEach(r=>{

let li=document.createElement("li")
li.innerText=r
list.appendChild(li)

})

}

</script>

</body>
</html>
