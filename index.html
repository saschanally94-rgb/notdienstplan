
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Notdienstplan</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
body{font-family:Arial;margin:20px}
#calendar{max-width:900px;margin:auto}
button{margin:5px;padding:10px;border-radius:8px;border:none;background:#2d8cff;color:white}
#stats{margin-top:20px}
</style>
</head>

<body>

<h2>Notdienstplan</h2>

<button onclick="generatePlan()">Plan generieren</button>
<button onclick="clearPlan()">Plan löschen</button>
<button onclick="exportStats()">Statistik exportieren</button>

<div id="calendar"></div>

<div id="stats"></div>

<script>

const employees=["TK","DG","MS","ES","SAM","DK"]

const fixedDays={
1:"TK",
2:"DG",
3:"MS",
4:"ES"
}

const holidays=[
{title:"Neujahr",start:"2026-01-01",color:"#ff6666"},
{title:"Karfreitag",start:"2026-04-03",color:"#ff6666"},
{title:"Ostermontag",start:"2026-04-06",color:"#ff6666"},
{title:"Tag der Arbeit",start:"2026-05-01",color:"#ff6666"},
{title:"Christi Himmelfahrt",start:"2026-05-14",color:"#ff6666"},
{title:"Pfingstmontag",start:"2026-05-25",color:"#ff6666"},
{title:"Fronleichnam",start:"2026-06-04",color:"#ff6666"},
{title:"Tag der Deutschen Einheit",start:"2026-10-03",color:"#ff6666"},
{title:"1. Weihnachtstag",start:"2026-12-25",color:"#ff6666"},
{title:"2. Weihnachtstag",start:"2026-12-26",color:"#ff6666"}
]

let calendar

document.addEventListener('DOMContentLoaded',function(){

calendar=new FullCalendar.Calendar(
document.getElementById('calendar'),
{

initialView:'dayGridMonth',
locale:'de',
firstDay:1,
weekNumbers:true,
selectable:true,

dayCellDidMount:function(info){

let d=info.date.getDay()

if(d===0 || d===6){
info.el.style.backgroundColor="#f2f2f2"
}

},

select:function(info){

let vacations=JSON.parse(localStorage.getItem("vacations")||"[]")

vacations.push({
title:"Urlaub",
start:info.startStr,
end:info.endStr,
color:"#66cc66"
})

localStorage.setItem("vacations",JSON.stringify(vacations))

checkConflicts()

loadEvents()

}

}

)

calendar.render()

loadEvents()

})

function generatePlan(){

let year=2026

let start=new Date(year,0,1)
let end=new Date(year,11,31)

let events=[]
let weekendIndex=0
let owner=null

for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){

let wd=d.getDay()
let iso=d.toISOString().split("T")[0]

let dienst

if(fixedDays[wd]){

dienst=fixedDays[wd]

}

else if(wd===5){

owner=employees[weekendIndex % employees.length]
weekendIndex++
dienst=owner

}

else if(wd===6 || wd===0){

dienst=owner

}

else{

dienst=employees[weekendIndex % employees.length]

}

events.push({
title:dienst,
start:iso,
color:"#2d8cff"
})

}

localStorage.setItem("plan",JSON.stringify(events))

loadEvents()
calculateStats()

}

function calculateStats(){

let plan=JSON.parse(localStorage.getItem("plan")||"[]")

let stats={}

employees.forEach(e=>stats[e]=0)

plan.forEach(p=>{

let d=new Date(p.start).getDay()

if(d===5||d===6||d===0){

stats[p.title]++

}

})

let html="<h3>Wochenend-Statistik</h3><table border=1><tr><th>MA</th><th>Dienste</th></tr>"

employees.forEach(e=>{

html+="<tr><td>"+e+"</td><td>"+stats[e]+"</td></tr>"

})

html+="</table>"

document.getElementById("stats").innerHTML=html

localStorage.setItem("stats",JSON.stringify(stats))

}

function exportStats(){

let stats=JSON.parse(localStorage.getItem("stats")||"{}")

let csv="MA,Dienste\n"

for(let k in stats){

csv+=k+","+stats[k]+"\n"

}

let blob=new Blob([csv],{type:"text/csv"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="dienststatistik.csv"
a.click()

}

function checkConflicts(){

let vacations=JSON.parse(localStorage.getItem("vacations")||"[]")

vacations.forEach(v=>{

let d=new Date(v.start)
let wd=d.getDay()

if(fixedDays[wd]){

alert("Konflikt: Urlaub kollidiert mit festem Dienst ("+fixedDays[wd]+")")

}

})

}

function clearPlan(){

localStorage.removeItem("plan")
localStorage.removeItem("vacations")
localStorage.removeItem("stats")

loadEvents()
document.getElementById("stats").innerHTML=""

}

function loadEvents(){

calendar.removeAllEvents()

let plan=JSON.parse(localStorage.getItem("plan")||"[]")
let vacations=JSON.parse(localStorage.getItem("vacations")||"[]")

plan.forEach(e=>calendar.addEvent(e))
vacations.forEach(e=>calendar.addEvent(e))
holidays.forEach(e=>calendar.addEvent(e))

}

</script>

</body>
</html>
