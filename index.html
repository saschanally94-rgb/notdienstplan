
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Notdienstplan (Local Test)</title>

<link rel="manifest" href="manifest.json">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
body{font-family:Arial;margin:15px}
#calendar{max-width:900px;margin:auto}
button{margin:5px;padding:8px}
</style>
</head>

<body>

<h2>Notdienstplan – lokale Testversion</h2>

<button onclick="generatePlan()">Plan generieren</button>
<button onclick="exportPDF()">PDF Export</button>

<div id="calendar"></div>

<script>

const employees=["TK","DG","MS","ES","SAM","DK"]
const fixedDays={0:"TK",1:"DG",2:"MS",3:"ES"}

let calendar

document.addEventListener('DOMContentLoaded',function(){

calendar=new FullCalendar.Calendar(
document.getElementById('calendar'),
{
initialView:'dayGridMonth',
selectable:true,

select:function(info){

let vacations=JSON.parse(localStorage.getItem("vacations")||"[]")

vacations.push({
start:info.startStr,
end:info.endStr
})

localStorage.setItem("vacations",JSON.stringify(vacations))

alert("Urlaub gespeichert")

}

})

calendar.render()
loadPlan()

})

function generatePlan(){

let year=2026
let start=new Date(year,0,1)
let end=new Date(year,11,31)

let events=[]
let weekendIndex=0
let owner=null

for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){

let wd=d.getDay()

let iso=d.toISOString().split("T")[0]

let dienst

if(wd===1) dienst="TK"
else if(wd===2) dienst="DG"
else if(wd===3) dienst="MS"
else if(wd===4) dienst="ES"
else if(wd===5){

owner=employees[weekendIndex%employees.length]
weekendIndex++
dienst=owner

}
else if(wd===6||wd===0){

dienst=owner

}

events.push({
title:dienst,
start:iso
})

}

localStorage.setItem("plan",JSON.stringify(events))

loadPlan()

alert("Plan erstellt")

}

function loadPlan(){

let events=JSON.parse(localStorage.getItem("plan")||"[]")

calendar.removeAllEvents()

events.forEach(e=>calendar.addEvent(e))

}

function exportPDF(){

let plan=JSON.parse(localStorage.getItem("plan")||"[]")

let text="Datum,Dienst\n"

plan.forEach(p=>{
text+=p.start+","+p.title+"\n"
})

let blob=new Blob([text],{type:"text/csv"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="dienstplan.csv"
a.click()

}

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js')
}

</script>

</body>
</html>
