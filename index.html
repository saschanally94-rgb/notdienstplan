
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Notdienstplan V7</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales/de.global.min.js"></script>

<style>
body{font-family:Arial;margin:20px}
#calendar{max-width:1000px;margin:auto}
button{margin:5px;padding:10px;border-radius:8px;border:none;background:#2d8cff;color:white}
#stats{margin-top:20px}
.legend span{padding:6px 10px;border-radius:6px;margin-right:6px;color:white}
</style>
</head>

<body>

<h2>Notdienstplan V7</h2>

<button onclick="generatePlan()">3‑Monats‑Plan generieren</button>
<button onclick="clearPlan()">Plan löschen</button>

<div class="legend">
<span style="background:#2d8cff">Dienst</span>
<span style="background:#ff6666">Feiertag</span>
</div>

<div id="calendar"></div>
<div id="stats"></div>

<script>

const employees=["TK","DG","MS","ES","SAM","DK"]

const fixedDays={
1:"TK",
2:"DG",
3:"MS",
4:"ES"
}

const holidays=[
{title:"Karfreitag",date:"2026-04-03"},
{title:"Ostermontag",date:"2026-04-06"},
{title:"Heiligabend",date:"2026-12-24"},
{title:"1. Weihnachtstag",date:"2026-12-25"},
{title:"2. Weihnachtstag",date:"2026-12-26"}
]

let calendar
let selected=null

document.addEventListener('DOMContentLoaded',function(){

calendar=new FullCalendar.Calendar(
document.getElementById('calendar'),
{

locale:'de',
firstDay:1,
weekNumbers:true,
initialView:'dayGridMonth',

headerToolbar:{
left:'prev,next today',
center:'title',
right:'dayGridMonth'
},

eventClick:function(info){

if(!selected){
selected=info.event
info.el.style.border="3px solid red"
}else{

let a=selected.title
let b=info.event.title

selected.setProp("title",b)
info.event.setProp("title",a)

selected=null

}

}

}

)

calendar.render()

})

function generatePlan(){

calendar.removeAllEvents()

let today=new Date()
let end=new Date()
end.setMonth(today.getMonth()+3)

let weekendIndex=0
let weekendOwner=null

let stats={}
employees.forEach(e=>stats[e]=0)

for(let d=new Date(today); d<=end; d.setDate(d.getDate()+1)){

let wd=d.getDay()
let iso=d.toISOString().split("T")[0]

let dienst

if(fixedDays[wd]){

dienst=fixedDays[wd]

}else if(wd===5){

weekendOwner=employees[weekendIndex % employees.length]
weekendIndex++
dienst=weekendOwner
stats[dienst]++

}else if(wd===6 || wd===0){

dienst=weekendOwner
stats[dienst]++

}else{

dienst=employees[weekendIndex % employees.length]

}

calendar.addEvent({
title:dienst,
start:iso,
color:"#2d8cff"
})

}

// Feiertage anzeigen
holidays.forEach(h=>{

calendar.addEvent({
title:h.title,
start:h.date,
color:"#ff6666"
})

})

showStats(stats)

}

function showStats(stats){

let html="<h3>Wochenenddienste (3 Monate)</h3><table border=1><tr><th>MA</th><th>Dienste</th></tr>"

for(let k in stats){
html+="<tr><td>"+k+"</td><td>"+stats[k]+"</td></tr>"
}

html+="</table>"

document.getElementById("stats").innerHTML=html

}

function clearPlan(){

calendar.removeAllEvents()
document.getElementById("stats").innerHTML=""

}

</script>

</body>
</html>
